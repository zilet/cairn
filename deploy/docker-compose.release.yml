# Release compose for running the published image without a source checkout.
#   mkdir cairn && cd cairn
#   curl -LO https://github.com/zilet/cairn/releases/latest/download/docker-compose.yml
#   docker compose up -d
# The release workflow pins :latest to the tagged version in the file attached to
# each GitHub release; this committed copy tracks :latest.
services:
  cairn:
    image: ghcr.io/zilet/cairn:latest
    container_name: cairn
    restart: unless-stopped
    ports:
      # SAFE DEFAULT: bound to loopback only, so a fresh cloud VM with a permissive
      # firewall and auth off does NOT expose Cairn to the internet. Reach it via an
      # SSH tunnel (`ssh -L 8787:127.0.0.1:8787 user@host`) or Tailscale Serve
      # (recommended remote path — see docs/DEPLOYMENT.md).
      #
      # To open it to your LAN/tailnet, change this to "8787:8787" (all interfaces).
      # NEVER widen it on an internet-reachable host without setting CAIRN_AUTH_TOKEN.
      - "127.0.0.1:8787:8787"
    volumes:
      - cairn-data:/data
      - cairn-home:/home/app
    environment:
      - TZ=${TZ:-America/New_York}
      # Optional shared-token auth. Unset = no auth; set it to gate /api and /mcp.
      # Recommended whenever the port is reachable beyond loopback.
      - CAIRN_AUTH_TOKEN=${CAIRN_AUTH_TOKEN:-}
      # Coaching: claude/codex/antigravity use their CLI subscription login (in the
      # cairn-home volume), NOT these env keys. Only Grok headless uses XAI_API_KEY.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      # ARTWORK only (gemini image model) — not a coaching agent.
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - COACH_AGENT=${COACH_AGENT:-}
      - COACH_DAY=${COACH_DAY:-0}
      - COACH_HOUR=${COACH_HOUR:-20}
      - AGENT_CLI_AUTO_UPDATE=${AGENT_CLI_AUTO_UPDATE:-0}
      - AGENT_CLI_AUTO_UPDATE_INTERVAL_HOURS=${AGENT_CLI_AUTO_UPDATE_INTERVAL_HOURS:-168}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  cairn-data:
  cairn-home:
