name: CI

# Offline test gate. Runs on pushes to main and on every PR. Tag pushes are
# intentionally excluded because the release workflow runs the same npm test gate
# before building and publishing the image.
on:
  push:
    branches: [main]
  pull_request:

# Never let two runs for the same ref pile up; cancel the stale one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # Full history so the PWA service-worker cache-bump guard can diff a PR
          # against its base branch.
          fetch-depth: 0

      - name: Set up Node 24
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify pinned action tags
        run: npm run actions:check -- --remote

      - name: Verify
        run: npm run verify

      - name: Runtime smoke
        run: npm run smoke
