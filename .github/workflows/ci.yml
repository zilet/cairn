name: CI

# Offline test gate. Runs on pushes to main and on every PR. Tag pushes are
# intentionally excluded because the release workflow runs the same npm test gate
# before building and publishing the image.
on:
  push:
    branches: [main]
  pull_request:

# Never let two runs for the same ref pile up; cancel the stale one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
