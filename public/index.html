<body>
  <header>
    <h1 id="header-title">Today</h1>
  </header>

  <main id="view"></main>

  <nav class="tabbar">
    <a class="brand" href="/" aria-label="Cairn — home">
      <img class="brand-mark" src="/icons/icon.svg" alt="" width="36" height="36">
      <span class="brand-text"><b>Cairn</b><small>Training log</small></span>
    </a>

    <button class="tab active" data-tab="today" aria-label="Today">
      <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4M9 15l2 2 4-4"/>
      </svg>
      <span class="tab-lbl">Today</span>
    </button>
    <button class="tab" data-tab="plan" aria-label="Plan">
      <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9.5 4V3.2A1.2 1.2 0 0 1 10.7 2h2.6a1.2 1.2 0 0 1 1.2 1.2V4M9.5 11h5M9.5 15h3.5"/>
      </svg>
      <span class="tab-lbl">Plan</span>
    </button>
    <button class="tab" data-tab="progress" aria-label="Progress">
      <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="3 16 9 10 13 14 21 6"/><polyline points="15 6 21 6 21 12"/>
      </svg>
      <span class="tab-lbl">Progress</span>
    </button>
    <button class="tab" data-tab="chat" aria-label="Chat">
      <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 11.5a8.5 8.5 0 0 1-12.4 7.55L3 21l1.95-5.6A8.5 8.5 0 1 1 21 11.5Z"/>
      </svg>
      <span class="tab-lbl">Chat</span>
    </button>
    <button class="tab" data-tab="me" aria-label="Me">
      <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="3.6"/><path d="M5 20a7 7 0 0 1 14 0"/>
      </svg>
      <span class="tab-lbl">Me</span>
    </button>
    <button class="tab" data-tab="settings" aria-label="Settings">
      <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 4h-7M10 4H3M21 12h-9M8 12H3M21 20h-5M12 20H3M14 2v4M8 10v4M16 18v4"/>
      </svg>
      <span class="tab-lbl">Settings</span>
    </button>
  </nav>

  <script src="/art.js"></script>
  <script src="/app.js"></script>
